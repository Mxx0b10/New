<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>Manish Patel — 3D Resume</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#4a6a84}
#c{position:fixed;top:0;left:0;width:100%;height:100%;display:block}

/* hint */
#hint{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  color:#fff;font:500 11px/1 'Segoe UI',sans-serif;letter-spacing:.12em;text-transform:uppercase;
  pointer-events:none;background:rgba(0,0,0,.48);padding:10px 24px;border-radius:24px;
  transition:opacity .5s;white-space:nowrap;z-index:10;
}
/* buttons */
.btn{
  position:fixed;z-index:20;font:500 10px/1 'Segoe UI',sans-serif;letter-spacing:.09em;text-transform:uppercase;
  border-radius:10px;padding:10px 18px;cursor:pointer;
  background:rgba(255,255,255,.13);backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.28);color:#fff;
  transition:background .2s,opacity .35s,transform .2s;
}
.btn:hover{background:rgba(255,255,255,.24);transform:translateY(-1px)}
#back{top:18px;left:18px;opacity:0;pointer-events:none}
#back.vis{opacity:1;pointer-events:all}
#fs{top:18px;right:18px}
/* error overlay */
#err{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(180,0,0,.9);color:#fff;padding:18px 26px;border-radius:10px;
  font:13px/1.5 monospace;max-width:80vw;z-index:999;
  display:none;white-space:pre-wrap;
}
/* loading */
#load{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  color:rgba(255,255,255,.7);font:400 12px/1 'Segoe UI',sans-serif;letter-spacing:.15em;text-transform:uppercase;
  z-index:50;transition:opacity .6s;pointer-events:none;
}
</style>
</head>

// ═══════════════════════════════════════════════════
//  CANVAS 2D HELPERS
// ═══════════════════════════════════════════════════
function wrap(ctx,text,x,y,maxW,lh){
  var words=text.split(' '),line='';
  for(var i=0;i<words.length;i++){
    var t=line+words[i]+' ';
    if(i>0&&ctx.measureText(t).width>maxW){ctx.fillText(line.trim(),x,y);line=words[i]+' ';y+=lh;}
    else line=t;
  }
  if(line.trim()) ctx.fillText(line.trim(),x,y);
  return y+lh;
}
function hline(ctx,x,y,w,col,lw){
  ctx.save();ctx.strokeStyle=col||'#ccc';ctx.lineWidth=lw||1.5;
  ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+w,y);ctx.stroke();ctx.restore();
}

// ═══════════════════════════════════════════════════
//  PAPER BACKGROUND — cream + sunlight + grain
// ═══════════════════════════════════════════════════
function paperBg(ctx,W,H){
  ctx.fillStyle='#f4eddf';ctx.fillRect(0,0,W,H);
  var sg=ctx.createRadialGradient(W*.88,0,0,W*.88,0,W*.9);
  sg.addColorStop(0,'rgba(255,244,190,.55)');
  sg.addColorStop(.45,'rgba(255,228,160,.18)');
  sg.addColorStop(1,'rgba(255,215,130,0)');
  ctx.fillStyle=sg;ctx.fillRect(0,0,W,H);
  // subtle vignette
  var vg=ctx.createRadialGradient(W/2,H/2,H*.3,W/2,H/2,H*.85);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(1,'rgba(0,0,0,.06)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  for(var i=0;i<55;i++){
    var a=Math.random()*Math.PI,cx=Math.random()*W,cy=Math.random()*H;
    var len=Math.random()*36+6,op=Math.random()*.038+.006;
    ctx.strokeStyle='rgba(105,88,68,'+op+')';ctx.lineWidth=Math.random()*.5+.1;
    ctx.beginPath();ctx.moveTo(cx+Math.cos(a)*len/2,cy+Math.sin(a)*len/2);
    ctx.lineTo(cx-Math.cos(a)*len/2,cy-Math.sin(a)*len/2);ctx.stroke();
  }
  for(var i=0;i<900;i++){
    var op=Math.random()*.038;
    ctx.fillStyle=Math.random()>.55?'rgba(75,60,40,'+op+')':'rgba(255,248,228,'+op+')';
    var s=Math.random()*1.4+.2;
    ctx.fillRect(Math.random()*W,Math.random()*H,s,s);
  }
  ctx.fillStyle='#b8b0a4';
  [[10,10],[W-10,10],[10,H-10],[W-10,H-10]].forEach(function(p){
    ctx.beginPath();ctx.arc(p[0],p[1],3.5,0,Math.PI*2);ctx.fill();
  });
}

// ═══════════════════════════════════════════════════
//  WOOD TABLE CANVAS  512 × 512
// ═══════════════════════════════════════════════════
function mkWood(){
  var W=512,H=512;
  var cv=document.createElement('canvas');cv.width=W;cv.height=H;
  var c=cv.getContext('2d');
  var g=c.createLinearGradient(0,0,W,0);
  g.addColorStop(0,'#7a5028');g.addColorStop(.3,'#8e6035');g.addColorStop(.65,'#9c6c3c');g.addColorStop(1,'#7a5028');
  c.fillStyle=g;c.fillRect(0,0,W,H);
  for(var i=0;i<55;i++){
    var x=(i/55)*W*1.5-W*.25,a=.045+Math.random()*.12;
    c.strokeStyle=Math.random()>.5?'rgba(20,5,0,'+a+')':'rgba(210,160,75,'+(a*.55)+')';
    c.lineWidth=Math.random()*2.8+.35;
    c.beginPath();c.moveTo(x,0);
    for(var yy=0;yy<=H;yy+=3) c.lineTo(x+Math.sin(yy*.02+i*.8)*15+Math.sin(yy*.055)*4,yy);
    c.stroke();
  }
  for(var r=22;r>0;r-=2){
    c.strokeStyle='rgba(28,6,0,'+(.05+(22-r)*.005)+')';c.lineWidth=1.8;
    c.beginPath();c.ellipse(W*.63,H*.37,r*1.3,r*.58,.18,0,Math.PI*2);c.stroke();
  }
  var sh=c.createLinearGradient(0,0,W,H);
  sh.addColorStop(0,'rgba(255,230,175,.1)');sh.addColorStop(.5,'rgba(255,215,150,.16)');sh.addColorStop(1,'rgba(195,148,78,.03)');
  c.fillStyle=sh;c.fillRect(0,0,W,H);
  return cv;
}

// ═══════════════════════════════════════════════════
//  RENDERER + SCENE + CAMERA
// ═══════════════════════════════════════════════════
var canvas3d=document.getElementById('c');
var W3=window.innerWidth,H3=window.innerHeight;

var renderer=new THREE.WebGLRenderer({canvas:canvas3d,antialias:false,powerPreference:'high-performance'});
renderer.setPixelRatio(1);
renderer.setSize(W3,H3);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFShadowMap;
renderer.setClearColor(0x4a6a84);

var scene=new THREE.Scene();
scene.background=new THREE.Color(0x4a6a84);
scene.fog=new THREE.Fog(0x4a6a84,20,40);

var camera=new THREE.PerspectiveCamera(55,W3/H3,0.05,200);
camera.position.set(3.8,3.2,5.2);
camera.lookAt(0,0,0);

// ═══════════════════════════════════════════════════
//  INLINE ORBIT CONTROLS
// ═══════════════════════════════════════════════════
var orbitEnabled=true,orbitState=0,orbitScale=1;
var orbitSph=new THREE.Spherical(),orbitSphD=new THREE.Spherical();
var orbitPan=new THREE.Vector3(),orbitTarget=new THREE.Vector3();
var _rS=new THREE.Vector2(),_rE=new THREE.Vector2();
var _pS=new THREE.Vector2(),_pE=new THREE.Vector2();
var _off=new THREE.Vector3(),_pv=new THREE.Vector3(),_pu=new THREE.Vector3();
var _quat=new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,1,0),new THREE.Vector3(0,1,0));
var _quatI=_quat.clone();
var MIN_DIST=2,MAX_DIST=22,DAMP=0.08;

function orbitUpdate(){
  _off.copy(camera.position).sub(orbitTarget);
  _off.applyQuaternion(_quat);
  orbitSph.setFromVector3(_off);
  orbitSph.theta+=orbitSphD.theta*DAMP;
  orbitSph.phi  +=orbitSphD.phi  *DAMP;
  orbitSph.phi=Math.max(0.05,Math.min(Math.PI*.46,orbitSph.phi));
  orbitSph.makeSafe();
  orbitSph.radius=Math.max(MIN_DIST,Math.min(MAX_DIST,orbitSph.radius*orbitScale));
  orbitTarget.addScaledVector(orbitPan,DAMP);
  _off.setFromSpherical(orbitSph);_off.applyQuaternion(_quatI);
  camera.position.copy(orbitTarget).add(_off);
  camera.lookAt(orbitTarget);
  orbitSphD.theta*=(1-DAMP);orbitSphD.phi*=(1-DAMP);
  orbitPan.multiplyScalar(1-DAMP);orbitScale=1;
}

canvas3d.addEventListener('mousedown',function(e){
  if(!orbitEnabled) return;
  if(e.button===0){_rS.set(e.clientX,e.clientY);orbitState=1;}
  else if(e.button===2){_pS.set(e.clientX,e.clientY);orbitState=3;}
  document.addEventListener('mousemove',onMM);document.addEventListener('mouseup',onMU);
});
function onMM(e){
  if(!orbitEnabled) return;
  if(orbitState===1){
    _rE.set(e.clientX,e.clientY);
    orbitSphD.theta-=2*Math.PI*(_rE.x-_rS.x)/canvas3d.clientHeight;
    orbitSphD.phi  -=2*Math.PI*(_rE.y-_rS.y)/canvas3d.clientHeight;
    _rS.copy(_rE);
  }else if(orbitState===3){
    _pE.set(e.clientX,e.clientY);
    _off.copy(camera.position).sub(orbitTarget);
    var td=_off.length()*Math.tan(camera.fov/2*Math.PI/180);
    _pv.setFromMatrixColumn(camera.matrix,0);_pv.multiplyScalar(-2*(_pE.x-_pS.x)*td/canvas3d.clientHeight);orbitPan.add(_pv);
    _pu.setFromMatrixColumn(camera.matrix,1);_pu.multiplyScalar(2*(_pE.y-_pS.y)*td/canvas3d.clientHeight);orbitPan.add(_pu);
    _pS.copy(_pE);
  }
}
function onMU(){document.removeEventListener('mousemove',onMM);document.removeEventListener('mouseup',onMU);orbitState=0;}
canvas3d.addEventListener('wheel',function(e){
  if(!orbitEnabled) return;e.preventDefault();
  e.deltaY<0?orbitScale*=.95:orbitScale/=.95;
},{passive:false});
canvas3d.addEventListener('contextmenu',function(e){e.preventDefault();});

// touch orbit
var _tdS=0;
canvas3d.addEventListener('touchstart',function(e){
  if(!orbitEnabled) return;
  var ts=e.touches;
  if(ts.length===1){orbitState=1;_rS.set(ts[0].pageX,ts[0].pageY);}
  else if(ts.length===2){orbitState=2;var dx=ts[0].pageX-ts[1].pageX,dy=ts[0].pageY-ts[1].pageY;_tdS=Math.sqrt(dx*dx+dy*dy);}
},{passive:true});
canvas3d.addEventListener('touchmove',function(e){
  if(!orbitEnabled) return;e.preventDefault();
  var ts=e.touches;
  if(orbitState===1&&ts.length===1){
    _rE.set(ts[0].pageX,ts[0].pageY);
    orbitSphD.theta-=2*Math.PI*(_rE.x-_rS.x)/canvas3d.clientHeight;
    orbitSphD.phi  -=2*Math.PI*(_rE.y-_rS.y)/canvas3d.clientHeight;
    _rS.copy(_rE);
  }else if(orbitState===2&&ts.length===2){
    var dx=ts[0].pageX-ts[1].pageX,dy=ts[0].pageY-ts[1].pageY;
    var dist=Math.sqrt(dx*dx+dy*dy);
    dist/_tdS>1?orbitScale*=.95:orbitScale/=.95;_tdS=dist;
  }
},{passive:false});
canvas3d.addEventListener('touchend',function(){orbitState=0;});

// ═══════════════════════════════════════════════════
//  LIGHTS
// ═══════════════════════════════════════════════════
scene.add(new THREE.HemisphereLight(0x88b8d8,0x3d2810,.55));

// Sun — position per spec: (0.5, 8, -4) adjusted for nice angle
var sun=new THREE.DirectionalLight(0xffe8c8,1.85);
sun.position.set(0.5,8,-4);sun.castShadow=true;
sun.shadow.mapSize.width=sun.shadow.mapSize.height=512;
sun.shadow.camera.near=.5;sun.shadow.camera.far=55;
sun.shadow.camera.left=-9;sun.shadow.camera.right=9;
sun.shadow.camera.top=9;sun.shadow.camera.bottom=-9;
sun.shadow.bias=-0.0015; // spec: softer paper-edge bias
scene.add(sun);

// Fill light
var fillLight=new THREE.DirectionalLight(0xaac8e8,.28);
fillLight.position.set(-8,5,-4);
scene.add(fillLight);

// Reading spotlight
var readLight=new THREE.SpotLight(0xfff8f0,0,14,Math.PI/3.5,.35,1.0);
readLight.position.set(0,6,2);
readLight.target.position.set(0,2.5,0);
scene.add(readLight);scene.add(readLight.target);

// Volumetric sun shaft
var shaftMat=new THREE.MeshBasicMaterial({
  color:0xffdf80,transparent:true,opacity:.042,
  side:THREE.BackSide,depthWrite:false,blending:THREE.AdditiveBlending
});
var shaft=new THREE.Mesh(new THREE.ConeGeometry(3.2,8,6,1,true),shaftMat);
shaft.position.set(6,8,3);shaft.rotation.z=-.45;shaft.rotation.x=.25;
scene.add(shaft);

// ═══════════════════════════════════════════════════
//  PAPER DIMENSIONS (declared early — used by shCatcher + paper meshes)
// ═══════════════════════════════════════════════════
var PW=2.2,PH=3.6;

// ═══════════════════════════════════════════════════
//  TABLE
// ═══════════════════════════════════════════════════
var woodTex=new THREE.CanvasTexture(mkWood());
woodTex.wrapS=woodTex.wrapT=THREE.RepeatWrapping;woodTex.repeat.set(2,1);
var table=new THREE.Mesh(
  new THREE.BoxGeometry(7,.22,5),
  new THREE.MeshStandardMaterial({map:woodTex,roughness:.4,metalness:.03})
);
table.position.y=-.11;table.receiveShadow=true;scene.add(table);

var legM=new THREE.MeshStandardMaterial({color:0x3c2110,roughness:.75});
[[-3.1,-.81,-2.1],[-3.1,-.81,2.1],[3.1,-.81,-2.1],[3.1,-.81,2.1]].forEach(function(p){
  var l=new THREE.Mesh(new THREE.BoxGeometry(.12,1.4,.12),legM);
  l.position.set(p[0],p[1],p[2]);l.castShadow=true;scene.add(l);
});
// table top edge gloss
var edgeMesh=new THREE.Mesh(new THREE.BoxGeometry(7.02,.03,5.02),
  new THREE.MeshStandardMaterial({color:0x8c5e38,roughness:.15,metalness:.08}));
scene.add(edgeMesh);

// shadow catcher
var shCatcher=new THREE.Mesh(new THREE.PlaneGeometry(PW+.8,PH+.8),new THREE.ShadowMaterial({opacity:.18}));
shCatcher.rotation.x=-Math.PI/2;shCatcher.position.y=.002;shCatcher.receiveShadow=true;scene.add(shCatcher);

// ═══════════════════════════════════════════════════
//  PROPS — mug + pen
// ═══════════════════════════════════════════════════
var mugM=new THREE.MeshStandardMaterial({color:0xf8f4ee,roughness:.25});
var mug=new THREE.Mesh(new THREE.CylinderGeometry(.23,.20,.46,14),mugM);
mug.position.set(2.4,.23,.8);mug.castShadow=true;scene.add(mug);
var hndl=new THREE.Mesh(new THREE.TorusGeometry(.12,.026,6,10,Math.PI),mugM);
hndl.position.set(2.62,.23,.8);hndl.rotation.y=Math.PI/2;scene.add(hndl);
var coff=new THREE.Mesh(new THREE.CircleGeometry(.20,16),
  new THREE.MeshStandardMaterial({color:0x3a1900,roughness:.45}));
coff.rotation.x=-Math.PI/2;coff.position.set(2.4,.49,.8);scene.add(coff);
var penM=new THREE.Mesh(new THREE.CylinderGeometry(.022,.022,1.5,10),
  new THREE.MeshStandardMaterial({color:0x101028,roughness:.3,metalness:.65}));
penM.position.set(-2.1,.04,-.45);penM.rotation.z=Math.PI/2;penM.rotation.y=.28;penM.castShadow=true;scene.add(penM);

// ═══════════════════════════════════════════════════
//  PAPER  PW=2.2  PH=3.6
// ═══════════════════════════════════════════════════
var paperGroup=new THREE.Group();scene.add(paperGroup);

var aniso=renderer.capabilities.getMaxAnisotropy();

// Front texture (canvas-drawn resume)
var ft=new THREE.CanvasTexture(mkFront());
ft.generateMipmaps=false;ft.minFilter=THREE.LinearFilter;ft.anisotropy=aniso;

// Back texture
var bt=new THREE.CanvasTexture(mkBack());
bt.generateMipmaps=false;bt.minFilter=THREE.LinearFilter;bt.anisotropy=aniso;

// Front face
var frontMesh=new THREE.Mesh(
  new THREE.PlaneGeometry(PW,PH),
  new THREE.MeshStandardMaterial({map:ft,roughness:.70,metalness:.02,side:THREE.FrontSide})
);
frontMesh.position.z=.007;frontMesh.castShadow=true;paperGroup.add(frontMesh);

// Back face
var backMesh=new THREE.Mesh(
  new THREE.PlaneGeometry(PW,PH),
  new THREE.MeshStandardMaterial({map:bt,roughness:.70,metalness:.02,side:THREE.BackSide})
);
backMesh.position.z=-.007;paperGroup.add(backMesh);

// Paper body (thin box for thickness)
paperGroup.add(new THREE.Mesh(
  new THREE.BoxGeometry(PW,PH,.014),
  new THREE.MeshStandardMaterial({color:0xeddfce,roughness:.92})
));

// Glow plane — fades in when reading
var glowMesh=new THREE.Mesh(
  new THREE.PlaneGeometry(PW+.5,PH+.5),
  new THREE.MeshBasicMaterial({color:0xfffbe8,transparent:true,opacity:0,depthWrite:false,blending:THREE.AdditiveBlending})
);
glowMesh.position.z=-.04;paperGroup.add(glowMesh);

// ── Paper initial state: flat on table ──
var INIT_Y=.12, INIT_RX=-Math.PI/2, INIT_RZ=.07;
paperGroup.position.set(0,INIT_Y,0);
paperGroup.rotation.x=INIT_RX;
paperGroup.rotation.z=INIT_RZ;

// ═══════════════════════════════════════════════════
//  READING CAMERA CONSTANTS
//  FLIP_Y=2.5, READ_Z=3.2
//  At FOV=55, z=3.2: vis_half = 3.2*tan(27.5°) = 1.665
//  paper half = 1.8  → most of paper visible; slight scroll for mobile
// ═══════════════════════════════════════════════════
var FLIP_Y=2.5, READ_Z=3.2;
var VIS_HALF=READ_Z*Math.tan(27.5*Math.PI/180); // ~1.665
var READ_TOP=(FLIP_Y+PH/2)-VIS_HALF;  // 2.5+1.8-1.665 = 2.635
var READ_BOT=(FLIP_Y-PH/2)+VIS_HALF;  // 2.5-1.8+1.665 = 2.365

function clamp(v,a,b){return v<a?a:v>b?b:v;}

var targetY=READ_TOP,currentY=READ_TOP,velocity=0;

// ═══════════════════════════════════════════════════
//  APP STATE
// ═══════════════════════════════════════════════════
var isFlipped=false,isAnimating=false,readingMode=false;
var savedCam=new THREE.Vector3(3.8,3.2,5.2);
var savedTgt=new THREE.Vector3(0,0,0);

var rc=new THREE.Raycaster(),mxy=new THREE.Vector2();
function hitsPaper(e){
  var r=canvas3d.getBoundingClientRect();
  var cx=e.touches?e.touches[0].clientX:e.clientX;
  var cy=e.touches?e.touches[0].clientY:e.clientY;
  mxy.set(((cx-r.left)/r.width)*2-1,-((cy-r.top)/r.height)*2+1);
  rc.setFromCamera(mxy,camera);
  return rc.intersectObjects([frontMesh,backMesh],false).length>0;
}

// ── FLIP UP ──
function flipUp(){
  if(isFlipped||isAnimating) return;
  isAnimating=true;orbitEnabled=false;
  document.getElementById('hint').style.opacity='0';
  document.getElementById('back').classList.add('vis');
  savedCam.copy(camera.position);savedTgt.copy(orbitTarget);
  targetY=currentY=READ_TOP;velocity=0;

  gsap.timeline({onComplete:function(){
    isAnimating=false;isFlipped=true;readingMode=true;
  }})
  // 1. Lift paper
  .to(paperGroup.position,{y:FLIP_Y,duration:.6,ease:'power2.out'})
  // 2. Rotate to face-forward (spec: rotateX 0, slight back.out)
  .to(paperGroup.rotation,{x:0,z:0,duration:.9,ease:'back.out(1.08)'},'-=.12')
  // 3. Camera lerps in — z=3.2, centred on paper
  .to(camera.position,{x:0,y:FLIP_Y,z:READ_Z,duration:.85,ease:'power3.inOut',
    onUpdate:function(){camera.lookAt(0,camera.position.y,0);}},'-=.55')
  // 4. Reading spotlight
  .to(readLight,{intensity:2.0,duration:.45},'-=.7')
  // 5. Glow in
  .to(glowMesh.material,{opacity:.10,duration:.35},'-=.6')
  // 6. Scale pulse — 1.05 bump then settle
  .to(paperGroup.scale,{x:1.05,y:1.05,z:1.05,duration:.18},'-=.55')
  .to(paperGroup.scale,{x:1,y:1,z:1,duration:.38,ease:'power1.inOut'});
}

// ── PUT DOWN ──
function putDown(){
  if(!isFlipped||isAnimating) return;
  isAnimating=true;readingMode=false;
  document.getElementById('back').classList.remove('vis');

  gsap.timeline({onComplete:function(){
    isAnimating=false;isFlipped=false;orbitEnabled=true;
    orbitTarget.copy(savedTgt);
    document.getElementById('hint').style.opacity='1';
  }})
  .to(readLight,{intensity:0,duration:.25})
  .to(glowMesh.material,{opacity:0,duration:.25},'-=.25')
  .to(paperGroup.scale,{x:1,y:1,z:1,duration:.15})
  .to(paperGroup.rotation,{x:INIT_RX,z:INIT_RZ,duration:.55,ease:'power2.inOut'})
  .to(paperGroup.position,{y:INIT_Y,duration:.5,ease:'power2.in'},'-=.28')
  .to(camera.position,{x:savedCam.x,y:savedCam.y,z:savedCam.z,duration:.75,ease:'power2.inOut',
    onUpdate:function(){camera.lookAt(0,0,0);}},'-=.42');
}

// ═══════════════════════════════════════════════════
//  SCROLL (reading mode — slight scroll for mobile)
// ═══════════════════════════════════════════════════
window.addEventListener('wheel',function(e){
  if(!readingMode) return;e.preventDefault();
  velocity-=e.deltaY*.0022;
},{passive:false});

var _ty=null;
canvas3d.addEventListener('touchstart',function(e){if(readingMode) _ty=e.touches[0].clientY;},{passive:true});
canvas3d.addEventListener('touchmove',function(e){
  if(!readingMode||_ty===null) return;e.preventDefault();
  velocity-=(_ty-e.touches[0].clientY)*.0035;_ty=e.touches[0].clientY;
},{passive:false});
canvas3d.addEventListener('touchend',function(){_ty=null;});

// ═══════════════════════════════════════════════════
//  CLICK / TAP
// ═══════════════════════════════════════════════════
var mdPos={x:0,y:0};
canvas3d.addEventListener('mousedown',function(e){mdPos={x:e.clientX,y:e.clientY};});
canvas3d.addEventListener('click',function(e){
  if(Math.abs(e.clientX-mdPos.x)>6||Math.abs(e.clientY-mdPos.y)>6) return;
  if(!isFlipped&&!isAnimating&&hitsPaper(e)){flipUp();return;}
  if(readingMode&&!isAnimating&&!hitsPaper(e)) putDown();
});
canvas3d.addEventListener('touchend',function(e){
  if(!isFlipped&&!isAnimating){
    var t=e.changedTouches[0];
    if(hitsPaper({clientX:t.clientX,clientY:t.clientY})) flipUp();
  }
},{passive:true});

// ── Buttons ──
document.getElementById('back').addEventListener('click',putDown);
document.getElementById('fs').addEventListener('click',function(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen().catch(function(){});
    document.getElementById('fs').textContent='✕ Exit Full';
  }else{
    document.exitFullscreen();
    document.getElementById('fs').textContent='⛶ Fullscreen';
  }
});

// ── ESC resets to table view (spec) ──
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    if(document.fullscreenElement) document.exitFullscreen();
    if(isFlipped&&!isAnimating) putDown();
  }
});

// ── Resize ──
window.addEventListener('resize',function(){
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// ═══════════════════════════════════════════════════
//  RENDER LOOP — capped ~40fps
// ═══════════════════════════════════════════════════
// Hide loading once we get to first frame
var _firstFrame=true;
var _lastFrame=0;
function tick(now){
  requestAnimationFrame(tick);
  if(now-_lastFrame<24) return; // ~40fps
  _lastFrame=now;

  if(_firstFrame){
    _firstFrame=false;
    document.getElementById('load').style.opacity='0';
    setTimeout(function(){document.getElementById('load').style.display='none';},700);
  }

  // idle float (only when flat on table)
  if(!isFlipped&&!isAnimating)
    paperGroup.position.y=INIT_Y+Math.sin(now*.0016)*.018;

  // reading mode scroll
  if(readingMode){
    targetY=clamp(targetY+velocity,READ_BOT,READ_TOP);
    velocity*=.80;
    if(Math.abs(velocity)<.00003) velocity=0;
    currentY+=(targetY-currentY)*.12;
    camera.position.y=currentY;
    camera.lookAt(0,currentY,0);
  }

  if(orbitEnabled) orbitUpdate();

  renderer.render(scene,camera);
}
requestAnimationFrame(tick);

}catch(e){
  var el=document.getElementById('err');
  el.style.display='block';
  el.textContent='ERROR: '+e.message+'\n'+(e.stack||'');
}
});// end load

 *         .to(camera.position, { x: 0, y: 2.5, z: 3.2, duration: .85 }, '-=.55')
