<script>
'use strict';

// ═══════════════════════════════════════════════════
//  CANVAS 2D — HELPERS
// ═══════════════════════════════════════════════════
function wrapText(ctx, text, x, y, maxW, lh) {
  const words = text.split(' ');
  let line = '';
  for (let i = 0; i < words.length; i++) {
    const t = line + words[i] + ' ';
    if (i > 0 && ctx.measureText(t).width > maxW) {
      ctx.fillText(line.trim(), x, y);
      line = words[i] + ' '; y += lh;
    } else line = t;
  }
  if (line.trim()) ctx.fillText(line.trim(), x, y);
  return y + lh;
}
function rule(ctx, x, y, w, c, lw) {
  ctx.save(); ctx.strokeStyle = c||'#ccc'; ctx.lineWidth = lw||1.5;
  ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+w,y); ctx.stroke(); ctx.restore();
}

// ═══════════════════════════════════════════════════
//  PAPER BACKGROUND — warm cream + grain + sunlight
// ═══════════════════════════════════════════════════
function paperBg(ctx, W, H) {
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0,   '#f2ede3');
  bg.addColorStop(0.5, '#f5f0e6');
  bg.addColorStop(1,   '#ede8de');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Sunlight glow top-right
  const sun = ctx.createRadialGradient(W*.85, 0, 0, W*.85, 0, W*.9);
  sun.addColorStop(0,   'rgba(255,240,180,.55)');
  sun.addColorStop(.4,  'rgba(255,230,160,.22)');
  sun.addColorStop(1,   'rgba(255,220,140,0)');
  ctx.fillStyle = sun; ctx.fillRect(0, 0, W, H);

  // Paper fibers
  for (let i = 0; i < 200; i++) {
    const a = Math.random()*Math.PI;
    const cx = Math.random()*W, cy = Math.random()*H;
    const len = Math.random()*45+8;
    const op = Math.random()*.045+.008;
    ctx.strokeStyle = `rgba(110,95,75,${op})`;
    ctx.lineWidth = Math.random()*.6+.1;
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(a)*len/2, cy+Math.sin(a)*len/2);
    ctx.lineTo(cx-Math.cos(a)*len/2, cy-Math.sin(a)*len/2);
    ctx.stroke();
  }

  // Fine grain
  for (let i = 0; i < 7000; i++) {
    const op = Math.random()*.05;
    ctx.fillStyle = Math.random()>.55
      ? `rgba(80,65,45,${op})`
      : `rgba(255,248,230,${op})`;
    const s = Math.random()*1.6+.2;
    ctx.fillRect(Math.random()*W, Math.random()*H, s, s);
  }

  // Corner marks
  ctx.fillStyle = '#bab3a8';
  [[11,11],[W-11,11],[11,H-11],[W-11,H-11]].forEach(([px,py])=>{
    ctx.beginPath(); ctx.arc(px,py,4.5,0,Math.PI*2); ctx.fill();
  });
}

// ═══════════════════════════════════════════════════
//  FRONT CANVAS — full resume  1024 × 1480
// ═══════════════════════════════════════════════════
function buildFront() {
  const W = 1024, H = 1480;
  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  const c = cv.getContext('2d');
  paperBg(c, W, H);

  const P = 56, CW = W - P*2;
  const SPLIT = P + ~~(CW * .42);

  // ── HEADER ─────────────────────────────────────
  let cy = 66;
  c.fillStyle = '#1e1e1e';
  c.font = '19px Arial, sans-serif';
  ['+91 (880) 081-6674','manish10thfeh@gmail.com','New Delhi, India'].forEach(t=>{
    c.fillText(t, P, cy); cy += 28;
  });
  cy += 8;
  c.fillStyle = '#1455cc'; c.font = 'bold 19px Arial, sans-serif';
  c.fillText('LinkedIn', P, cy);
  c.fillRect(P, cy+4, c.measureText('LinkedIn').width, 1.5);
  const x1 = P + c.measureText('LinkedIn').width;
  c.fillStyle = '#aaa'; c.font = '19px Arial, sans-serif'; c.fillText('  |  ', x1, cy);
  const x2 = x1 + c.measureText('  |  ').width;
  c.fillStyle = '#1455cc'; c.font = 'bold 19px Arial, sans-serif';
  c.fillText('Portfolio', x2, cy);
  c.fillRect(x2, cy+4, c.measureText('Portfolio').width, 1.5);

  // Name
  c.fillStyle = '#0f0f0f'; c.font = 'bold 52px Georgia, serif';
  c.fillText('Manish Patel', SPLIT, 72);

  // Summary
  c.fillStyle = '#3a3630'; c.font = '16.5px Arial, sans-serif';
  let sy = 93;
  ['User Experience Designer with 1.5+ years',
   'of experience designing enterprise web apps',
   'and data-driven dashboards, translating',
   'complex requirements into clear, usable',
   'interfaces.'].forEach(l=>{ c.fillText(l, SPLIT, sy); sy+=23; });

  // ── DIVIDER ─────────────────────────────────────
  let y = 242;
  rule(c, P, y, CW, '#c8c2ba', 1.2); y += 32;

  // ── EXPERIENCE ──────────────────────────────────
  c.fillStyle = '#0f0f0f'; c.font = 'bold 30px Georgia, serif';
  c.fillText('Experience', P, y); y += 10;
  rule(c, P, y, CW, '#ddd8d2'); y += 26;

  function job(title, company, loc, dates, bullets) {
    c.fillStyle = '#111'; c.font = 'bold 19px Arial, sans-serif';
    c.fillText(title, P, y);
    if(loc){ c.fillStyle='#666'; c.font='16px Arial,sans-serif'; c.fillText(loc, W-P-c.measureText(loc).width, y); }
    y += 23;
    c.fillStyle = '#777'; c.font = '16px Arial, sans-serif'; c.fillText(company, P, y);
    c.fillStyle = '#999'; c.fillText(dates, W-P-c.measureText(dates).width, y);
    y += 24;
    c.font = '15.5px Arial, sans-serif';
    bullets.forEach(b => {
      c.fillStyle = '#555';
      c.beginPath(); c.arc(P+7, y-5, 2.8, 0, Math.PI*2); c.fill();
      c.fillStyle = '#1a1a1a';
      y = wrapText(c, b, P+18, y, CW-18, 22);
      y += 2;
    });
    y += 14;
  }

  job('UX/UI Designer','Retail One Solutions & Services (ROSS)','New Delhi, India','Sep 2024 – Present',[
    'Spearheaded end-to-end UX/UI design for Koncept Global Books EdTech platform — role-based dashboards accelerating test creation by 50% through digital automation.',
    'Transformed Farmers App into B2B marketplace (Country Delight model), enabling 2 new partnerships in Q1 2024-2025.',
    'Launched 3 responsive websites — time-on-page +429% (7s→37s), conversion +25%, 200+ leads in 2025-2026.',
    'Developed full brand identity for ROSS: logo revamp, guidelines, design manual.',
    'LinkedIn content strategy: 20+ design posts positioning ROSS as industry thought leader.',
  ]);

  job('Freelance UX Designer','Self Employed','','Nov 2025 – Present',[
    'Delivered 2 conversion-optimized websites for hotel & banquet sectors — 45% increase in lead generation.',
    'Secured 3rd place in New Forms Design Challenge among 200+ international designers.',
  ]);

  // ── DIVIDER ─────────────────────────────────────
  rule(c, P, y, CW, '#c8c2ba', 1.2); y += 28;

  // ── SKILLS ──────────────────────────────────────
  c.fillStyle = '#0f0f0f'; c.font = 'bold 30px Georgia, serif';
  c.fillText('Skills', P, y); y += 10;
  rule(c, P, y, CW, '#ddd8d2'); y += 24;

  const skillCols = [
    {t:'Design & Prototyping', items:['Figma','Paper','Framer','Adobe Illustrator','Wireframing','Lottielabs','Jitter','HTML, CSS, JS']},
    {t:'Research & Strategy',  items:['User Research','Usability Testing','Information Architecture','Market Research','Google Analytics']},
    {t:'Systems & Visual',     items:['Design Systems','Design Libraries','Typography','Visual Design','Animation (Jitter)']},
  ];
  const cw3 = ~~(CW/3), sy0 = y; let maxY = y;
  skillCols.forEach((col, i) => {
    const cx = P + i*cw3; let iy = sy0;
    c.fillStyle = '#111'; c.font = 'bold 15.5px Arial, sans-serif'; c.fillText(col.t, cx, iy); iy += 21;
    col.items.forEach(item => {
      c.fillStyle = '#777'; c.beginPath(); c.arc(cx+6, iy-5, 2, 0, Math.PI*2); c.fill();
      c.fillStyle = '#1e1e1e'; c.font = '14.5px Arial, sans-serif'; c.fillText(item, cx+14, iy); iy += 20;
    });
    if(iy > maxY) maxY = iy;
  });
  y = maxY + 22;

  // ── DIVIDER ─────────────────────────────────────
  rule(c, P, y, CW, '#c8c2ba', 1.2); y += 28;

  // ── EDUCATION ───────────────────────────────────
  c.fillStyle = '#0f0f0f'; c.font = 'bold 30px Georgia, serif';
  c.fillText('Education & Certifications', P, y); y += 10;
  rule(c, P, y, CW, '#ddd8d2'); y += 26;

  function edu(deg, school, dates) {
    c.fillStyle = '#111'; c.font = 'bold 17px Arial, sans-serif'; c.fillText(deg, P, y);
    c.fillStyle = '#888'; c.font = '15px Arial, sans-serif';
    c.fillText(dates, W-P-c.measureText(dates).width, y); y += 22;
    c.fillStyle = '#999'; c.font = '15px Arial, sans-serif'; c.fillText(school, P, y); y += 30;
  }
  edu('Advanced UI/UX Design Program','Arean Animation','Jun 2023 – Sep 2024');
  edu("Bachelor's in English (Honors)",'Delhi University','Aug 2021 – Aug 2024');

  // Footer
  c.fillStyle = 'rgba(140,130,115,.3)';
  c.font = '11px Arial, sans-serif';
  c.fillText('MANISH PATEL  ·  UX/UI DESIGNER  ·  manish10thfeh@gmail.com', P, H-18);

  return cv;
}

// ═══════════════════════════════════════════════════
//  BACK CANVAS — decorative 512×720
// ═══════════════════════════════════════════════════
function buildBack() {
  const W=512, H=720;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const c=cv.getContext('2d');
  paperBg(c,W,H);
  c.fillStyle='rgba(100,88,70,.1)';
  c.font='bold 160px Georgia,serif';
  c.textAlign='center';
  c.fillText('MP', W/2, H/2+50);
  c.fillStyle='rgba(100,88,70,.22)';
  c.font='bold 13px Arial,sans-serif';
  c.fillText('MANISH PATEL  ·  UX/UI DESIGNER', W/2, H/2+100);
  c.textAlign='left';
  return cv;
}

// ═══════════════════════════════════════════════════
//  WOOD CANVAS — 512×512
// ═══════════════════════════════════════════════════
function buildWood() {
  const W=512, H=512;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const c=cv.getContext('2d');
  const g=c.createLinearGradient(0,0,W,0);
  g.addColorStop(0,'#7a4f2a'); g.addColorStop(.25,'#8d5e35');
  g.addColorStop(.5,'#9b6a3c'); g.addColorStop(.75,'#8a5a32'); g.addColorStop(1,'#7a4f2a');
  c.fillStyle=g; c.fillRect(0,0,W,H);
  for(let i=0;i<70;i++){
    const x=(i/70)*W*1.6-W*.3;
    const a=.04+Math.random()*.14;
    c.strokeStyle=Math.random()>.5?`rgba(25,8,0,${a})`:`rgba(220,170,90,${a*.6})`;
    c.lineWidth=Math.random()*3.5+.4;
    c.beginPath(); c.moveTo(x,0);
    for(let yy=0;yy<=H;yy+=3)
      c.lineTo(x+Math.sin(yy*.02+i*.8)*18+Math.sin(yy*.06)*6,yy);
    c.stroke();
  }
  for(let r=28;r>0;r-=2){
    c.strokeStyle=`rgba(35,10,0,${.05+(28-r)*.004})`; c.lineWidth=2;
    c.beginPath(); c.ellipse(W*.62,H*.38,r*1.4,r*.65,.18,0,Math.PI*2); c.stroke();
  }
  const sh=c.createLinearGradient(0,0,W,H);
  sh.addColorStop(0,'rgba(255,235,185,.12)'); sh.addColorStop(.5,'rgba(255,220,160,.2)');
  sh.addColorStop(1,'rgba(200,155,85,.05)');
  c.fillStyle=sh; c.fillRect(0,0,W,H);
  return cv;
}

// ═══════════════════════════════════════════════════
//  THREE.JS — RENDERER + SCENE
// ═══════════════════════════════════════════════════
const canvas3d = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas: canvas3d, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0x5a7a94, 1);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x5a7a94);
scene.fog = new THREE.Fog(0x5a7a94, 16, 36);

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.05, 200);
camera.position.set(4, 3.5, 5);
camera.lookAt(0, 0, 0);

// ═══════════════════════════════════════════════════
//  ORBIT CONTROLS — fully inlined, no CDN
// ═══════════════════════════════════════════════════
(function(){
  THREE.OrbitControls = function(object, domElement) {
    this.object = object;
    this.domElement = domElement;
    this.enabled = true;
    this.target = new THREE.Vector3();
    this.minDistance = 1.5; this.maxDistance = 24;
    this.minPolarAngle = 0; this.maxPolarAngle = Math.PI * .47;
    this.enableDamping = true; this.dampingFactor = .07;
    this.rotateSpeed = 1.0; this.zoomSpeed = 1.0; this.panSpeed = 1.0;
    this.enableZoom = true; this.enableRotate = true; this.enablePan = true;

    const scope = this;
    const STATE = {NONE:-1,ROTATE:0,DOLLY:1,PAN:2,TR:3,TDOLLY:4};
    let state = STATE.NONE, scale = 1;
    const spherical = new THREE.Spherical();
    const sphericalDelta = new THREE.Spherical();
    const panOffset = new THREE.Vector3();
    const rotS=new THREE.Vector2(),rotE=new THREE.Vector2(),rotD=new THREE.Vector2();
    const panS=new THREE.Vector2(),panE=new THREE.Vector2(),panD=new THREE.Vector2();
    const dollyS=new THREE.Vector2(),dollyE=new THREE.Vector2();
    const offset = new THREE.Vector3();
    const quat = new THREE.Quaternion().setFromUnitVectors(object.up, new THREE.Vector3(0,1,0));
    const quatI = quat.clone().invert();
    const pv=new THREE.Vector3(), pu=new THREE.Vector3();
    let lP=new THREE.Vector3(), lQ=new THREE.Quaternion();
    const EPS=1e-6;

    function gzs(){ return Math.pow(.95,scope.zoomSpeed); }
    function panL(d,m){ pv.setFromMatrixColumn(m,0); pv.multiplyScalar(-d); panOffset.add(pv); }
    function panU(d,m){ pu.setFromMatrixColumn(m,1); pu.multiplyScalar(d); panOffset.add(pu); }
    function doPan(dx,dy){
      offset.copy(object.position).sub(scope.target);
      const td=offset.length()*Math.tan(object.fov/2*Math.PI/180);
      panL(2*dx*td/domElement.clientHeight,object.matrix);
      panU(2*dy*td/domElement.clientHeight,object.matrix);
    }

    this.update = function(){
      offset.copy(object.position).sub(scope.target);
      offset.applyQuaternion(quat);
      spherical.setFromVector3(offset);
      const df = scope.enableDamping ? scope.dampingFactor : 1;
      spherical.theta += sphericalDelta.theta * df;
      spherical.phi   += sphericalDelta.phi   * df;
      spherical.phi=Math.max(scope.minPolarAngle,Math.min(scope.maxPolarAngle,spherical.phi));
      spherical.makeSafe();
      spherical.radius=Math.max(scope.minDistance,Math.min(scope.maxDistance,spherical.radius*scale));
      scope.target.addScaledVector(panOffset,df);
      offset.setFromSpherical(spherical); offset.applyQuaternion(quatI);
      object.position.copy(scope.target).add(offset);
      object.lookAt(scope.target);
      if(scope.enableDamping){
        sphericalDelta.theta*=(1-df); sphericalDelta.phi*=(1-df);
        panOffset.multiplyScalar(1-df);
      } else { sphericalDelta.set(0,0,0); panOffset.set(0,0,0); }
      scale=1;
      if(lP.distanceToSquared(object.position)>EPS||8*(1-lQ.dot(object.quaternion))>EPS){
        lP.copy(object.position); lQ.copy(object.quaternion); return true;
      }
      return false;
    };

    function onMD(e){
      if(!scope.enabled) return;
      if(e.button===0){ rotS.set(e.clientX,e.clientY); state=STATE.ROTATE; }
      else if(e.button===1){ dollyS.set(e.clientX,e.clientY); state=STATE.DOLLY; }
      else if(e.button===2){ panS.set(e.clientX,e.clientY); state=STATE.PAN; }
      if(state!==STATE.NONE){ document.addEventListener('mousemove',onMM); document.addEventListener('mouseup',onMU); }
    }
    function onMM(e){
      if(!scope.enabled) return;
      if(state===STATE.ROTATE){
        rotE.set(e.clientX,e.clientY); rotD.subVectors(rotE,rotS).multiplyScalar(scope.rotateSpeed);
        sphericalDelta.theta-=2*Math.PI*rotD.x/domElement.clientHeight;
        sphericalDelta.phi  -=2*Math.PI*rotD.y/domElement.clientHeight;
        rotS.copy(rotE); scope.update();
      } else if(state===STATE.DOLLY){
        dollyE.set(e.clientX,e.clientY);
        (dollyE.y-dollyS.y)>0 ? scale/=gzs() : scale*=gzs();
        dollyS.copy(dollyE); scope.update();
      } else if(state===STATE.PAN){
        panE.set(e.clientX,e.clientY); panD.subVectors(panE,panS).multiplyScalar(scope.panSpeed);
        doPan(panD.x,panD.y); panS.copy(panE); scope.update();
      }
    }
    function onMU(){ document.removeEventListener('mousemove',onMM); document.removeEventListener('mouseup',onMU); state=STATE.NONE; }
    function onW(e){ if(!scope.enabled||!scope.enableZoom) return; e.preventDefault(); e.deltaY<0?scale*=gzs():scale/=gzs(); scope.update(); }

    let tc=[];
    function onTS(e){
      if(!scope.enabled) return;
      tc=Array.from(e.touches);
      if(tc.length===1){ state=STATE.TR; rotS.set(tc[0].pageX,tc[0].pageY); }
      else if(tc.length===2){ state=STATE.TDOLLY; const dx=tc[0].pageX-tc[1].pageX,dy=tc[0].pageY-tc[1].pageY; dollyS.set(0,Math.sqrt(dx*dx+dy*dy)); }
    }
    function onTM(e){
      if(!scope.enabled) return; e.preventDefault();
      const nt=Array.from(e.touches);
      if(state===STATE.TR&&nt.length===1){
        rotE.set(nt[0].pageX,nt[0].pageY); rotD.subVectors(rotE,rotS).multiplyScalar(scope.rotateSpeed);
        sphericalDelta.theta-=2*Math.PI*rotD.x/domElement.clientHeight;
        sphericalDelta.phi  -=2*Math.PI*rotD.y/domElement.clientHeight;
        rotS.copy(rotE); scope.update();
      } else if(state===STATE.TDOLLY&&nt.length===2){
        const dx=nt[0].pageX-nt[1].pageX,dy=nt[0].pageY-nt[1].pageY;
        dollyE.set(0,Math.sqrt(dx*dx+dy*dy));
        dollyE.y/dollyS.y>1?scale*=gzs():scale/=gzs();
        dollyS.copy(dollyE); scope.update();
      }
    }
    function onTE(){ state=STATE.NONE; }

    domElement.addEventListener('mousedown',onMD);
    domElement.addEventListener('wheel',onW,{passive:false});
    domElement.addEventListener('touchstart',onTS,{passive:false});
    domElement.addEventListener('touchmove',onTM,{passive:false});
    domElement.addEventListener('touchend',onTE);
    domElement.addEventListener('contextmenu',e=>e.preventDefault());
    this.dispose=()=>{
      domElement.removeEventListener('mousedown',onMD);
      domElement.removeEventListener('wheel',onW);
      domElement.removeEventListener('touchstart',onTS);
      domElement.removeEventListener('touchmove',onTM);
      domElement.removeEventListener('touchend',onTE);
    };
    this.update();
  };
})();

const controls = new THREE.OrbitControls(camera, canvas3d);
controls.enableDamping=true; controls.dampingFactor=.065;
controls.minDistance=1.5; controls.maxDistance=24;

// ═══════════════════════════════════════════════════
//  LIGHTS
// ═══════════════════════════════════════════════════
scene.add(new THREE.HemisphereLight(0x88b8d8, 0x3d2810, .6));

const sun = new THREE.DirectionalLight(0xffe8c8, 1.9);
sun.position.set(10, 16, 8); sun.castShadow=true;
sun.shadow.mapSize.width=sun.shadow.mapSize.height=2048;
Object.assign(sun.shadow.camera,{near:.5,far:70,left:-10,right:10,top:10,bottom:-10});
sun.shadow.bias=-.001; scene.add(sun);

scene.add(Object.assign(new THREE.DirectionalLight(0xaac8e8,.3),{position:new THREE.Vector3(-8,6,-5)}));

const readLight = new THREE.SpotLight(0xfff5e8, 0, 12, Math.PI/4, .3, 1.1);
readLight.position.set(0,5,3); readLight.target.position.set(0,1.6,0);
scene.add(readLight); scene.add(readLight.target);

// Sunlight shaft
const shaftMat = new THREE.MeshBasicMaterial({
  color:0xffe090,transparent:true,opacity:.05,
  side:THREE.BackSide,depthWrite:false,blending:THREE.AdditiveBlending
});
const shaftMesh=new THREE.Mesh(new THREE.ConeGeometry(3.5,9,8,1,true),shaftMat);
shaftMesh.position.set(7,8,5); shaftMesh.rotation.z=-.5; shaftMesh.rotation.x=.2;
scene.add(shaftMesh);

// ═══════════════════════════════════════════════════
//  TABLE + PROPS
// ═══════════════════════════════════════════════════
const woodTex=new THREE.CanvasTexture(buildWood());
woodTex.wrapS=woodTex.wrapT=THREE.RepeatWrapping; woodTex.repeat.set(2,1);

const table=new THREE.Mesh(
  new THREE.BoxGeometry(7,.22,5),
  new THREE.MeshStandardMaterial({map:woodTex,roughness:.4,metalness:.03})
);
table.position.y=-.11; table.receiveShadow=true; scene.add(table);

const legM=new THREE.MeshStandardMaterial({color:0x3c2110,roughness:.75});
[[-3.1,-.81,-2.1],[-3.1,-.81,2.1],[3.1,-.81,-2.1],[3.1,-.81,2.1]].forEach(p=>{
  const l=new THREE.Mesh(new THREE.BoxGeometry(.12,1.4,.12),legM);
  l.position.set(...p); l.castShadow=true; scene.add(l);
});
scene.add(new THREE.Mesh(new THREE.BoxGeometry(7.02,.03,5.02),
  new THREE.MeshStandardMaterial({color:0x8c5e38,roughness:.16,metalness:.07})));

const mugMat=new THREE.MeshStandardMaterial({color:0xf8f4ee,roughness:.25});
const mug=new THREE.Mesh(new THREE.CylinderGeometry(.24,.21,.48,28),mugMat);
mug.position.set(2.4,.24,.8); mug.castShadow=true; scene.add(mug);
const handle=new THREE.Mesh(new THREE.TorusGeometry(.13,.028,8,16,Math.PI),mugMat);
handle.position.set(2.64,.24,.8); handle.rotation.y=Math.PI/2; scene.add(handle);
const coffeeD=new THREE.Mesh(new THREE.CircleGeometry(.21,24),new THREE.MeshStandardMaterial({color:0x3a1900,roughness:.4}));
coffeeD.rotation.x=-Math.PI/2; coffeeD.position.set(2.4,.505,.8); scene.add(coffeeD);
const pen=new THREE.Mesh(new THREE.CylinderGeometry(.024,.024,1.55,12),new THREE.MeshStandardMaterial({color:0x101028,roughness:.3,metalness:.65}));
pen.position.set(-2.1,.05,-.45); pen.rotation.z=Math.PI/2; pen.rotation.y=.28; pen.castShadow=true; scene.add(pen);

// ═══════════════════════════════════════════════════
//  PAPER GROUP  PW=2.2  PH=3.6
// ═══════════════════════════════════════════════════
const PW=2.2, PH=3.6;
const paperGroup=new THREE.Group(); scene.add(paperGroup);

const aniso=renderer.capabilities.getMaxAnisotropy();

const frontTex=new THREE.CanvasTexture(buildFront());
frontTex.generateMipmaps=false; frontTex.minFilter=THREE.LinearFilter; frontTex.anisotropy=aniso;

const backTex=new THREE.CanvasTexture(buildBack());
backTex.generateMipmaps=false; backTex.minFilter=THREE.LinearFilter; backTex.anisotropy=aniso;

const frontMesh=new THREE.Mesh(
  new THREE.PlaneGeometry(PW,PH),
  new THREE.MeshStandardMaterial({map:frontTex,roughness:.78,metalness:.02,side:THREE.FrontSide})
);
frontMesh.position.z=.006; frontMesh.castShadow=true; paperGroup.add(frontMesh);

const backMesh=new THREE.Mesh(
  new THREE.PlaneGeometry(PW,PH),
  new THREE.MeshStandardMaterial({map:backTex,roughness:.78,metalness:.02,side:THREE.BackSide})
);
backMesh.position.z=-.006; paperGroup.add(backMesh);

paperGroup.add(new THREE.Mesh(
  new THREE.BoxGeometry(PW,PH,.012),
  new THREE.MeshStandardMaterial({color:0xede5da,roughness:.92})
));

const shCatcher=new THREE.Mesh(
  new THREE.PlaneGeometry(PW+.6,PH+.6),
  new THREE.ShadowMaterial({opacity:.2})
);
shCatcher.rotation.x=-Math.PI/2; shCatcher.position.y=.002;
shCatcher.receiveShadow=true; scene.add(shCatcher);

// Initial: flat on table, front face up
const INIT_Y=.12, INIT_RX=-Math.PI/2, INIT_RZ=.07;
paperGroup.position.set(0,INIT_Y,0);
paperGroup.rotation.x=INIT_RX; paperGroup.rotation.z=INIT_RZ;

// ═══════════════════════════════════════════════════
//  READING MODE MATH
//  Paper center after flip: FLIP_Y=1.6
//  Paper top edge:    1.6+3.6/2 = 3.4
//  Paper bottom:      1.6-3.6/2 = -0.2
//  At READ_Z=1.15, FOV=60°: vis_half=1.15*tan30°=0.664
//  READ_TOP = 3.4-0.664 = 2.736 (camera Y shows top of paper)
//  READ_BOT = -0.2+0.664= 0.464 (camera Y shows bottom of paper)
// ═══════════════════════════════════════════════════
const FLIP_Y=1.6, READ_Z=1.15;
const VIS_HALF=READ_Z*Math.tan(30*Math.PI/180);
const READ_TOP=(FLIP_Y+PH/2)-VIS_HALF;  // 2.736
const READ_BOT=(FLIP_Y-PH/2)+VIS_HALF;  // 0.464

let targetY=READ_TOP, currentY=READ_TOP, velocity=0;
const clamp=(v,a,b)=>v<a?a:v>b?b:v;

const sfill=document.getElementById('sfill');
const sbar=document.getElementById('sbar');
function updateBar(){ sfill.style.height=(clamp((READ_TOP-currentY)/(READ_TOP-READ_BOT),0,1)*100)+'%'; }

// ═══════════════════════════════════════════════════
//  APP STATE
// ═══════════════════════════════════════════════════
let isFlipped=false, isAnimating=false, readingMode=false;
const savedCam=new THREE.Vector3(4,3.5,5);
const savedTgt=new THREE.Vector3(0,0,0);

const rc=new THREE.Raycaster(), mxy=new THREE.Vector2();
function hitsPaper(e){
  const r=canvas3d.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  mxy.set(((cx-r.left)/r.width)*2-1,-((cy-r.top)/r.height)*2+1);
  rc.setFromCamera(mxy,camera);
  return rc.intersectObjects([frontMesh,backMesh],false).length>0;
}

// ── FLIP UP ────────────────────────────────────────
function flipUp(){
  if(isFlipped||isAnimating) return;
  isAnimating=true; controls.enabled=false;
  document.getElementById('hint').style.opacity='0';
  document.getElementById('back').classList.add('vis');
  savedCam.copy(camera.position); savedTgt.copy(controls.target);
  targetY=currentY=READ_TOP; velocity=0;

  const tl=gsap.timeline({onComplete(){
    isAnimating=false; isFlipped=true; readingMode=true;
    document.getElementById('rdhint').style.opacity='1';
    sbar.style.opacity='1'; updateBar();
  }});
  tl.to(paperGroup.position,{y:FLIP_Y,duration:.5,ease:'power2.out'});
  tl.to(paperGroup.rotation,{x:0,z:0,duration:.75,ease:'back.out(1.1)'},'-=.15');
  tl.to(camera.position,{
    x:0,y:READ_TOP,z:READ_Z,duration:.85,ease:'power3.inOut',
    onUpdate(){ camera.lookAt(0,camera.position.y,0); }
  },'-=.5');
  tl.to(readLight,{intensity:2.2,duration:.5},'-=.65');
  tl.to(paperGroup.scale,{x:1.015,y:1.015,z:1.015,duration:.2},'-=.55');
  tl.to(paperGroup.scale,{x:1,y:1,z:1,duration:.3,ease:'power1.inOut'});
}

// ── PUT DOWN ───────────────────────────────────────
function putDown(){
  if(!isFlipped||isAnimating) return;
  isAnimating=true; readingMode=false;
  document.getElementById('rdhint').style.opacity='0';
  document.getElementById('back').classList.remove('vis');
  sbar.style.opacity='0';

  const tl=gsap.timeline({onComplete(){
    isAnimating=false; isFlipped=false; controls.enabled=true;
    controls.target.copy(savedTgt);
    document.getElementById('hint').style.opacity='1';
  }});
  tl.to(readLight,{intensity:0,duration:.3});
  tl.to(paperGroup.rotation,{x:INIT_RX,z:INIT_RZ,duration:.6,ease:'power2.inOut'});
  tl.to(paperGroup.position,{y:INIT_Y,duration:.5,ease:'power2.in'},'-=.3');
  tl.to(camera.position,{
    x:savedCam.x,y:savedCam.y,z:savedCam.z,duration:.8,ease:'power2.inOut',
    onUpdate(){ camera.lookAt(0,0,0); }
  },'-=.5');
}

// ── SCROLL ─────────────────────────────────────────
window.addEventListener('wheel',e=>{
  if(!readingMode) return;
  e.preventDefault();
  velocity -= e.deltaY * .0025;
},{passive:false});

let _ty=null;
canvas3d.addEventListener('touchstart',e=>{ if(readingMode) _ty=e.touches[0].clientY; },{passive:true});
canvas3d.addEventListener('touchmove',e=>{
  if(!readingMode||_ty===null) return; e.preventDefault();
  velocity-=(_ty-e.touches[0].clientY)*.004; _ty=e.touches[0].clientY;
},{passive:false});
canvas3d.addEventListener('touchend',()=>{ _ty=null; });

// ── CLICK / TAP ────────────────────────────────────
let mdPos={x:0,y:0};
canvas3d.addEventListener('mousedown',e=>{ mdPos={x:e.clientX,y:e.clientY}; });
canvas3d.addEventListener('click',e=>{
  if(Math.abs(e.clientX-mdPos.x)>6||Math.abs(e.clientY-mdPos.y)>6) return;
  if(!isFlipped&&!isAnimating&&hitsPaper(e)){ flipUp(); return; }
  if(readingMode&&!isAnimating&&!hitsPaper(e)) putDown();
});
canvas3d.addEventListener('touchend',e=>{
  if(!isFlipped&&!isAnimating){
    const t=e.changedTouches[0];
    if(hitsPaper({clientX:t.clientX,clientY:t.clientY})) flipUp();
  }
},{passive:true});

document.getElementById('back').addEventListener('click',putDown);
document.getElementById('fs').addEventListener('click',()=>{
  if(!document.fullscreenElement){ document.documentElement.requestFullscreen().catch(()=>{}); document.getElementById('fs').textContent='✕ Exit'; }
  else{ document.exitFullscreen(); document.getElementById('fs').textContent='⛶ Fullscreen'; }
});
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

// ═══════════════════════════════════════════════════
//  RENDER LOOP
// ═══════════════════════════════════════════════════
function tick(){
  requestAnimationFrame(tick);
  const t=Date.now();

  if(!isFlipped&&!isAnimating)
    paperGroup.position.y=INIT_Y+Math.sin(t*.0018)*.016;

  if(readingMode){
    targetY=clamp(targetY+velocity,READ_BOT,READ_TOP);
    velocity*=.82;
    if(Math.abs(velocity)<.00004) velocity=0;
    currentY+=(targetY-currentY)*.1;
    camera.position.y=currentY;
    camera.lookAt(0,currentY,0);
    updateBar();
  }

  sun.intensity=1.9+Math.sin(t*.00024)*.05;
  shaftMat.opacity=.05+Math.sin(t*.0008)*.007;

  if(!readingMode) controls.update();
  renderer.render(scene,camera);
}

tick();
</script>
</body>
</html>
